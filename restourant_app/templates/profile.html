{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Settings</title>
    <link rel="stylesheet" href="{% static 'restourant_app/css/header.css' %}">
    <link rel="stylesheet" href="{% static 'restourant_app/css/profile.css' %}">
</head>
<body>

<header class="header">
    <div class="container header-inner">
        <div class="logo">Food gourmet</div>
        <nav class="menu">
            <a href="/">home</a>
            <a href="/profile">profile</a>
            <a href="/about_us/">about us</a>
            <a href="/food/">food</a>
        </nav>
    </div>
</header>

<section class="profile-section">
    <div class="profile-card">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="avatar-section">
                <label for="id_avatar">
                    <div class="profile-avatar">
                        {% if user.profile.avatar %}
                            <img src="{{ user.profile.avatar.url }}" alt="Avatar">
                        {% else %}
                            <div class="empty-avatar-circle">
                                {{ user.username|first|upper }}
                            </div>
                        {% endif %}
                    </div>
                </label>
                <input type="file" name="avatar" id="id_avatar" style="display:none">
                <p class="change-photo-text">Change Photo</p>
            </div>

            <div class="profile-header">
                <h2>Personal Profile</h2>
                <span class="username-display">@{{ user.username|upper }}</span>
            </div>

            <hr class="divider">

            <div class="form-body">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" name="username" value="{{ user.username }}" class="custom-input">
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" name="email" value="{{ user.email }}" class="custom-input">
                </div>
            </div>

            <button type="submit" class="save-btn">Save Settings</button>
            
            {% if message %}
                <span class="success-message">Profile successfully updated!</span>
            {% endif %}
        </form>
    </div>
</section>

</body>
</html>
